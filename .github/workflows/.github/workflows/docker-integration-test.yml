name: Integration Test - Docker Compose

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: docker-test-${{ github.event.pull_request.number || 'manual' }}
  cancel-in-progress: true

jobs:
  docker-integration-test:
    name: Docker Compose Integration Test
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: money-app:test
          load: true
      
      - name: Start docker-compose
        run: |
          cat > .env.test << EOF
          DB_PASSWORD=testpass123
          NODE_ENV=production
          APP_PORT=8080
          SSL_MODE=selfsigned
          DOMAIN=localhost
          SESSION_SECRET=$(openssl rand -hex 32)
          EOF
          docker-compose up -d
          sleep 10
      
      - name: Health checks
        run: |
          echo "✓ Checking PostgreSQL..."
          docker-compose exec -T postgres pg_isready -U bvmoney || exit 1
          
          echo "✓ Checking API..."
          for i in {1..30}; do
            docker-compose exec -T api curl -s http://127.0.0.1:3001/api/health 2>/dev/null | grep -q status && echo "✓ API healthy" && exit 0
            sleep 2
          done
          exit 1
      
      - name: Post success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Docker Compose Test Passed**\n\nYou can test locally:\n\`\`\`bash\ncp docker/.env.example .env.docker\ndocker-compose up --build\n\`\`\``
            })
      
      - name: Cleanup
        if: always()
        run: docker-compose down -v || true
