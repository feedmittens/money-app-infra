name: CI - Docker Build & Lint

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:
    branches: [main, develop]

jobs:
  docker-build:
    name: Docker Compose Build Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - run: docker-compose config > /dev/null && echo "✓ docker-compose.yml valid"

  shellcheck:
    name: ShellCheck Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get install -y shellcheck
      - run: shellcheck -x lxc-setup.sh deploy.sh scripts/container-init.sh || true

  markdown:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          for file in *.md; do
            [ -f "$file" ] && grep -q "^#" "$file" && echo "✓ $file valid"
          done
