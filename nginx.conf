server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve the WASM file with the correct MIME type (required for sql.js)
    location ~* \.wasm$ {
        add_header Content-Type application/wasm;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Cache hashed assets forever
    location ~* \.(js|css|ico|png|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — send all routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
